name: AssSubtitles
description: Renders .ass/.ssa subtitles on the scene player using jassub (libass compiled to WASM). Requires a Custom Served Folder pointing to your subtitle files.
version: 0.1.0
settings:
  customSubsPrefix:
    displayName: Custom Served Folder prefix
    description: The URL prefix configured in Stash Settings → System → Custom Served Folders that points to your .ass subtitle directory. Default is "subs".
    type: STRING
  subtitleLanguage:
    displayName: Subtitle language code
    description: Language code used in subtitle filenames, e.g. "en" for Scene.en.ass. Leave empty to only match Scene.ass (no language code). Default is "en".
    type: STRING
  customFontsPrefix:
    displayName: Custom fonts folder prefix
    description: Optional. URL prefix of a Custom Served Folder containing font files (.ttf/.otf). Leave empty to use the same folder as subtitles. Example value "fonts".
    type: STRING
  fontFilenames:
    displayName: Font filenames (comma-separated)
    description: Comma-separated list of font filenames in the custom fonts folder to preload, e.g. "Arial.ttf,MyFont.otf". Only used when Custom fonts folder prefix is set.
    type: STRING
ui:
  requires:
    - CommunityScriptsUILibrary
  javascript:
    - AssSubtitles.js
  assets:
    /: assets
  csp:
    script-src:
      - "'wasm-unsafe-eval'"
    connect-src:
      - https://fonts.googleapis.com
      - https://fonts.gstatic.com
